    <title>TestMate</title>
    <script>
      // 防闪: 同步读 localStorage, 在 main.ts 跑之前设上 data-theme
      (function () {
        try {
          var m = localStorage.getItem('testmate:theme') || 'auto';
          if (m !== 'light' && m !== 'dark' && m !== 'auto') m = 'auto';
          document.documentElement.setAttribute('data-theme', m);
          var isDark = m === 'dark' || (m === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', isDark);
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
