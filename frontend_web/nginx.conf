server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header Cache-Control "no-store, no-cache, must-revalidate" always;
  add_header Pragma "no-cache" always;
  add_header Expires "0" always;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    # 86 部署是 "半 docker 半主机" — 后端是主机 nohup uvicorn 进程 (0.0.0.0:8000).
    # 原配置 `http://backend:8000` 指向已 Exited 的 testmate-backend 容器 (squid 镜像,挂了 7 天).
    # 改走 testmate-net 网关 172.21.0.1 (= 宿主机 from 容器视角) 直连 8000.
    proxy_pass http://172.21.0.1:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 300s;
    proxy_buffering off;
  }
}
