name: test-mate

# 用法:
#   cp deploy/.env.template deploy/.env && $EDITOR deploy/.env
#   sudo ./deploy/deploy.sh                       # 在线
#   sudo ./deploy/deploy.sh --offline             # 离线

services:
  # ==================== MySQL ====================
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?must set}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-testmate}
      MYSQL_USER: ${MYSQL_USER:-testmate}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?must set}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_HOST_PORT:-43060}:3306"
    volumes:
      - ${DATA_ROOT:-/opt/testmate/data}/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${MYSQL_CPU_LIMIT:-2.0}"
          memory: "${MYSQL_MEM_LIMIT:-2g}"
    networks: [test-mate-net]

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-63790}:6379"
    volumes:
      - ${DATA_ROOT:-/opt/testmate/data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "${REDIS_CPU_LIMIT:-0.5}"
          memory: "${REDIS_MEM_LIMIT:-512m}"
    networks: [test-mate-net]

  # ==================== Backend ====================
  backend:
    build:
      context: ../backend_gateway
      dockerfile: Dockerfile
    image: test-mate-backend:latest
    restart: unless-stopped
    extra_hosts:
      # 让 backend 容器能通过 host.docker.internal 访问 host(mac/Windows 默认支持,
      # Linux Docker 24+ 也支持). 用于:外部 RAGFlow / Dify 跑 host 上时的连接
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      APP_NAME: TestMate Gateway
      APP_VERSION: 0.1.0
      DEBUG: "false"
      HOST: 0.0.0.0
      PORT: "8000"

      JWT_SECRET: ${JWT_SECRET:?must set}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-10080}

      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: ${MYSQL_USER:-testmate}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?must set}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-testmate}

      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"

      DIFY_MOCK: ${DIFY_MOCK:-true}
      DIFY_BASE_URL: ${DIFY_BASE_URL:-}
      DIFY_API_KEY: ${DIFY_API_KEY:-}
      DIFY_TIMEOUT_SECONDS: "120"

      RAGFLOW_BASE_URL: ${RAGFLOW_BASE_URL:-}
      RAGFLOW_API_KEY: ${RAGFLOW_API_KEY:-}

      DINGTALK_DEFAULT_WEBHOOK: ${DINGTALK_DEFAULT_WEBHOOK:-}

      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-ChangeMe@2026}
    ports:
      - "${BACKEND_HOST_PORT:-18000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${BACKEND_CPU_LIMIT:-2.0}"
          memory: "${BACKEND_MEM_LIMIT:-2g}"
    networks: [test-mate-net]

  # ==================== Frontend ====================
  frontend:
    build:
      context: ../frontend_web
      dockerfile: Dockerfile
    image: test-mate-frontend:latest
    restart: unless-stopped
    depends_on:
      backend: { condition: service_healthy }
    ports:
      - "${FRONTEND_HOST_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "${FRONTEND_CPU_LIMIT:-0.5}"
          memory: "${FRONTEND_MEM_LIMIT:-256m}"
    networks: [test-mate-net]

networks:
  test-mate-net:
    driver: bridge
